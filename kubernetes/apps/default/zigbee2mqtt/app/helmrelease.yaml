---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app zigbee2mqtt
  namespace: default
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: zigbee2mqtt
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      *app :
        type: deployment
        replicas: 1
        containers:
          main:
            image: 
              repository: ghcr.io/koenkk/zigbee2mqtt
              tag: 1.41.0
            resources:
              requests:
                cpu: 15m
                memory: 150Mi
              limits:
                memory: 150Mi
            securityContext:
              privileged: true
            probes:
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
              liveness:
                enabled: true
              readiness:
                enabled: true
            env:
              ZIGBEE2MQTT_DATA: /data
              ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED: "true"
              # mqtt
              ZIGBEE2MQTT_CONFIG_MQTT_SERVER: mqtt://mosquitto
              ZIGBEE2MQTT_CONFIG_MQTT_INCLUDE_DEVICE_INFORMATION: "true"
              ZIGBEE2MQTT_CONFIG_MQTT_VERSION: "5"
              # adapter
              ZIGBEE2MQTT_CONFIG_SERIAL_PORT: &usbdevice /dev/ttyACM0
              ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER: deconz
              # frontend
              ZIGBEE2MQTT_CONFIG_FRONTEND_PORT: &port 8080
              ZIGBEE2MQTT_CONFIG_FRONTEND_URL: https://z2m.nas01.kirstein.me/#/
    service:
      zigbee2mqtt:
        controller: *app
        ports:
          http:
            port: *port
            protocol: HTTP
            appProtocol: http
    serviceMonitor:
      app:
        serviceName: *app
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: &uid 1000
        runAsGroup: *uid
        fsGroup: *uid
        fsGroupChangePolicy: Always
        seccompProfile: { type: "RuntimeDefault" }
    persistence:
      data:
        enabled: true
        storageClass:  nfs-client
        accessMode: ReadWriteOnce
        size: 1Gi
      usb:
        enabled: true
        hostPath: *usbdevice
        hostPathType: CharDevice
        globalMounts:
          - path: *usbdevice
    securityContext:
      privileged: true
      runAsGroup: 20
    ingress:
      main:
        enabled: true
        className: "internal-ingress"
        annotations: 
          external-dns.alpha.kubernetes.io/hostname: z2m.nas01.kirstein.me
        hosts:
          - host: "z2m.nas01.kirstein.me"
            paths:
              - path: /
                pathType: Prefix