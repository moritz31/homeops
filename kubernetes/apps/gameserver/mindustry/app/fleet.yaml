apiVersion: "agones.dev/v1"
kind: Fleet
metadata:
  name: mindustry
  labels:
    game: mindustry
spec:
  replicas: 1
  scheduling: Packed
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        game: mindustry
    spec:
      container: mindustry-fleet
      ports:
      - name: default-tcp
        portPolicy: Static
        container: mindustry-fleet
        containerPort: 6567
        hostPort: 7337
        protocol: TCP
      - name: default-udp
        portPolicy: Static
        container: mindustry-fleet
        containerPort: 6567
        hostPort: 7337
        protocol: UDP
      health:
        disabled: false
        initialDelaySeconds: 45
        periodSeconds: 5
        failureThreshold: 3
      sdkServer:
        logLevel: Info
        grpcPort: 9357
        httpPort: 9358
      players:
        initialCapacity: 4
      template:
        metadata:
          labels:
            game: mindustry
        spec:
          containers:
            - name: mindustry-fleet
              image: docker.io/salmonit/agones-mindustry:159.7.4
              ports:
                - name: main
                  containerPort: 6567
              stdin: true
              resources:
                requests:
                  cpu: '1'
                  memory: 1Gi
                limits:
                  cpu: '2'
                  memory: 2Gi
              volumeMounts:
                - name: data
                  mountPath: /data
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: mindustry-data